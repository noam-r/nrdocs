# This workflow publishes the docs in this repository using nrdocs via GitHub Actions OIDC.
# It requires no per-repo GitHub variables or secrets.
name: Publish Docs to nrdocs

on:
  push:
    branches:
      - main

jobs:
  publish:
    name: Publish documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build payload and publish
        run: |
          set -euo pipefail

          API_BASE="https://nrdocs-control-plane.nrdocs.workers.dev"
          DOCS_DIR="docs"

          # Request a GitHub Actions OIDC token scoped to the Control Plane URL (audience)
          audience=$(printf '%s' "${API_BASE}" | jq -sRr @uri)
          oidc_json=$(curl -sSf -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${audience}")
          oidc_token=$(echo "$oidc_json" | jq -r '.value')
          if [ -z "$oidc_token" ] || [ "$oidc_token" = "null" ]; then
            echo "::error::Failed to acquire GitHub OIDC token"
            exit 1
          fi

          # Exchange OIDC for short-lived publish credentials (repo_id + repo_publish_token)
          exchange_code=$(curl -s -o exchange.json -w '%{http_code}' -X POST -H "Authorization: Bearer $oidc_token" "${API_BASE}/oidc/publish-credentials")
          if [ "$exchange_code" -lt 200 ] || [ "$exchange_code" -ge 300 ]; then
            echo "::error::OIDC exchange failed with HTTP $exchange_code"
            cat exchange.json || true
            exit 1
          fi
          NRDOCS_REPO_ID=$(jq -r '.repo_id' < exchange.json)
          NRDOCS_PUBLISH_TOKEN=$(jq -r '.repo_publish_token' < exchange.json)
          if [ -z "$NRDOCS_REPO_ID" ] || [ "$NRDOCS_REPO_ID" = "null" ]; then
            echo "::error::OIDC exchange did not return repo_id"
            cat exchange.json
            exit 1
          fi
          if [ -z "$NRDOCS_PUBLISH_TOKEN" ] || [ "$NRDOCS_PUBLISH_TOKEN" = "null" ]; then
            echo "::error::OIDC exchange did not return repo_publish_token"
            cat exchange.json
            exit 1
          fi

          # --- Read config files ---
          if [ ! -f "$DOCS_DIR/project.yml" ]; then
            echo "::error::project.yml not found in $DOCS_DIR"
            exit 1
          fi
          project_yml=$(jq -Rs '.' < "$DOCS_DIR/project.yml")

          if [ ! -f "$DOCS_DIR/nav.yml" ]; then
            echo "::error::nav.yml not found in $DOCS_DIR"
            exit 1
          fi
          nav_yml=$(jq -Rs '.' < "$DOCS_DIR/nav.yml")

          if [ -f "$DOCS_DIR/allowed-list.yml" ]; then
            allowed_list_yml=$(jq -Rs '.' < "$DOCS_DIR/allowed-list.yml")
          else
            allowed_list_yml="null"
          fi

          # --- Read all Markdown pages from content/ ---
          if [ ! -d "$DOCS_DIR/content" ]; then
            echo "::error::content/ directory not found in $DOCS_DIR"
            exit 1
          fi

          pages_json=$(jq -n '{}')
          while IFS= read -r -d '' file; do
            relative="${file#"$DOCS_DIR/content/"}"
            key="${relative%.md}"
            page_content=$(jq -Rs '.' < "$file")
            pages_json=$(echo "$pages_json" | jq --arg k "$key" --argjson v "$page_content" '. + {($k): $v}')
          done < <(find "$DOCS_DIR/content" -name '*.md' -type f -print0 | sort -z)

          # --- Assemble the full payload ---
          payload=$(jq -n \
            --argjson project_yml "$project_yml" \
            --argjson nav_yml "$nav_yml" \
            --argjson allowed_list_yml "$allowed_list_yml" \
            --argjson pages "$pages_json" \
            '{
              repo_content: {
                project_yml: $project_yml,
                nav_yml: $nav_yml,
                allowed_list_yml: $allowed_list_yml,
                pages: $pages
              }
            }')

          # --- POST to Control Plane publish endpoint ---
          echo "Publishing from $DOCS_DIR to ${API_BASE}/repos/${NRDOCS_REPO_ID}/publish ..."

          http_code=$(curl -s -o response.json -w '%{http_code}' \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${NRDOCS_PUBLISH_TOKEN}" \
            -H "X-Repo-Identity: github.com/${{ github.repository }}" \
            -d "$payload" \
            "${API_BASE}/repos/${NRDOCS_REPO_ID}/publish")

          echo "Response status: ${http_code}"
          cat response.json

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Publish failed with HTTP ${http_code}"
            exit 1
          fi

          echo "Publish succeeded."

